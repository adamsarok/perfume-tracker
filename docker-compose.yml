services:
  perfume-tracker:
    image: adamsarok/perfume-tracker
    ports:
      - 3000:3000
    restart: unless-stopped
    build:
       context: ./perfumetracker.client/
       dockerfile: Dockerfile
       args:
         VITE_PERFUMETRACKER_API_ADDRESS: ${PERFUMETRACKER_API_ADDRESS}
  perfume-tracker-api:
    image: adamsarok/perfume-tracker-api
    ports:
      - 7080:8080
      - 7081:8081
    environment:
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - OTEL_SERVICE_NAME=perfume-tracker-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    restart: unless-stopped
    build:
      context: .
      dockerfile: PerfumeTracker.Server/Dockerfile
